data:
  raw_path: data/raw/Electronics.csv
  processed_path: data/processed/interactions.csv
  processed_sample_path: data/processed/interactions_sample.csv
  snapshots_dir: data/snapshots
  graphs_dir: data/graphs
  graph2018_path: data/graphs/graph_2018.graphml
  user_map_path: data/interim/user_map.pkl
  item_map_path: data/interim/item_map.pkl

filtering:
  min_user_interactions: 5
  min_item_interactions: 5
  min_year: 2010

graph:
  years: [2015, 2016, 2017, 2018]

results:
  metrics_plot_dir: results/plots
  metrics_dir: results/metrics
  models_dir: results/models

experiment:
  train_years: [2015, 2016, 2017]
  eval_modes: ["all", "rated"]
  k: 10
  n_users: 1000
  random_seed: 42
  rating_threshold: 4.0

models:
  item_cf:
    top_n_similar: 50
  pagerank:
    alpha: 0.85
  multi_hop:
    modes: ["3"]
  multi_hop_penalized:
    modes: ["3"]
    penalties: ["sqrt", "log", "quadratic"]
